# A string used to distinguish different Supabase projects on the same host.
# Defaults to the working directory name when not specified.
project_id = "ai-visibility-tracker"

[api]
enabled = true
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this schema will get API endpoints.
# public and storage are always included.
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search_path of every request. public is always included.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure. Limits payload size for accidental or malicious requests.
max_rows = 1000

[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialize the shadow database.
shadow_port = 54320
# The database major version to use. This has to be the same as your remote database's. Run `SHOW server_version;` on the remote database to check.
major_version = 15

[studio]
enabled = true
# Port to use for Supabase Studio.
port = 54323
# External URL of the API server that frontend connects to.
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

# Email testing server. Emails sent with the local dev setup are not actually sent - rather, they
# are monitored, and you can view the emails that would have been sent from the web interface.
[inbucket]
enabled = true
# Port to use for the email testing server web interface.
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
# The maximum file size allowed (e.g. "5MB", "500KB").
file_size_limit = "50MiB"

[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects and for constructing URLs used
# in emails.
site_url = "http://127.0.0.1:3000"
# A list of *exact* URLs that auth providers are permitted to redirect to post authentication.
additional_redirect_urls = [
  "https://127.0.0.1:3000",
  "http://127.0.0.1:3000/auth/callback",
  "http://localhost:3000/auth/callback",
  "https://neuralreach.de/auth/callback",
  "https://www.neuralreach.de/auth/callback",
]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour), maximum 604,800 (1 week).
jwt_expiry = 3600
# If disabled, the refresh token will never expire.
enable_refresh_token_rotation = true
# Set the minimum length for passwords.
minimum_password_length = 8

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the old, and new email
# addresses. If disabled, only the new email is required to confirm.
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in.
enable_confirmations = false

# Custom email template: shows a 6-digit OTP code prominently (above the magic link)
# so iCloud/Apple Mail prefetch cannot burn the only auth path.
# IMPORTANT: the cloud project template must also be updated — see supabase/SETUP.md.
# [auth.email.template.magic_link]
# DISABLED at the config level — `supabase db push` parses this file even
# though it's a local-dev-only section, and path resolution behaves
# differently between local CLI invocations and the GitHub Actions runner
# (caused DB Migrate workflow to fail with "open templates/magic_link.html:
# no such file" on 2026-06-11 regardless of whether the path was relative
# to repo root or to supabase/).
#
# The production magic-link template is configured directly in the
# Supabase Cloud Dashboard:
#   https://supabase.com/dashboard/project/unrfdcxkmelafypuyruk/auth/templates
# The HTML source is preserved at supabase/templates/magic_link.html for
# reference. If you change the dashboard template, also update that file
# so the source-of-truth stays version-controlled. See supabase/SETUP.md.
#
# subject = "Your NeuralReach sign-in code"
# content_path = "./templates/magic_link.html"

[analytics]
enabled = false
port = 54327
vector_port = 54328
# Setup BigQuery project to enable log viewer on local development stack.
# See: https://supabase.com/docs/guides/getting-started/local-development#enabling-local-logging
#gcp_project_id = ""
#gcp_project_number = ""
#gcp_jwt_path = "supabase/gcloud.json"
